services:
  api:
    build: .
    container_name: chefai-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./temp_upload:/app/temp_upload
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: .
    container_name: chefai-frontend
    env_file:
      - .env
    environment:
      CHEFAI_API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501